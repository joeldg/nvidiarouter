name: Release

# Publishes to PyPI when you push a version tag, e.g. `git tag v0.1.0 && git push --tags`.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token needed once you register a
# trusted publisher for this repo/workflow at https://pypi.org/manage/account/publishing/.
# (To use a token instead, set a PYPI_API_TOKEN secret and add
#  `with: password: ${{ secrets.PYPI_API_TOKEN }}` to the publish step.)

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
